hydra:
  run:
    dir: src/tuning/outputs/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: src/tuning/outputs/sweeps/${now:%Y-%m-%d_%H-%M-%S}_${run_tag}
    subdir: job_${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: null
      consider_prior: true
      prior_weight: 1.0
      consider_magic_clip: true
      consider_endpoints: false
      n_startup_trials: 10
      n_ei_candidates: 24
      multivariate: false
      warn_independent_sampling: true
    _target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper
    direction: maximize
    storage: null
    study_name: gdp2_wm_sweep
    n_trials: 40
    n_jobs: 2
    search_space: null
    params:
      model.num_heads: choice(4, 6, 8, 12)
      model.num_layers: choice(2, 3, 4, 6, 8)
      model.mlp_ratio: choice(2, 4, 8)
      training.learning_rate: interval(0.00001, 0.001)
      training.batch_size: choice(32, 64, 128)
      training.sequence_length: choice(16, 24, 32)
    custom_search_space: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - model.num_heads=12
    - model.num_layers=6
    - model.mlp_ratio=4
    - training.learning_rate=0.0005816547998580041
    - training.batch_size=128
    - training.sequence_length=32
  job:
    name: train_sweep
    chdir: false
    override_dirname: model.mlp_ratio=4,model.num_heads=12,model.num_layers=6,training.batch_size=128,training.learning_rate=0.0005816547998580041,training.sequence_length=32
    id: '21'
    num: 21
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: C:\Dev\GDP2-WorldModel
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: C:\Dev\GDP2-WorldModel\src\tuning\conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: C:\Dev\GDP2-WorldModel\src\tuning\outputs\sweeps\2026-03-12_20-22-03_baseline\job_21
    choices:
      training: base
      model: base
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: optuna
      hydra/sweeper/sampler: tpe
      hydra/launcher: basic
      hydra/output: default
  verbose: false
